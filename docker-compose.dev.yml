# Development docker-compose for faster iteration
# Development docker-compose for faster iteration
services:
  ollama:
    image: ollama/ollama:latest
    container_name: latticereact-ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: latticereact-app-dev
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MP_API_KEY=${MP_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    env_file:
      - .env
    volumes:
      - .:/app  # Live code mounting for development
      - ./logs:/app/logs
      - ./cache:/app/cache
    ports:
      - "8000:8000"
    command: python run_supervisor.py --help
    networks:
      - latticereact-dev-network

volumes:
  ollama_dev_data:
    driver: local

networks:
  latticereact-dev-network:
    driver: bridge